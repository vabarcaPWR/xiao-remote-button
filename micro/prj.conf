# GPIO for relay control and status LED
CONFIG_GPIO=y

# Disable NCS Partition Manager (Adafruit bootloader needs code at 0x27000)
CONFIG_PARTITION_MANAGER_ENABLED=n

# USB CDC for serial console (development/debug)
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y

# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="FIP-relay"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1

# BLE connection parameters (power optimization)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=80
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=400
CONFIG_BT_PERIPHERAL_PREF_LATENCY=4
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=1000

# Stack size for BLE workqueue
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Hardware watchdog (fail-safe: resets MCU if firmware hangs)
CONFIG_WATCHDOG=y

# Power management (idle sleep between events)
CONFIG_PM=y
